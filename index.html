<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Descifra el Idioma de Esteban</title>
</head>
<body>
<h1>Descifra el Idioma de Esteban</h1>

<p>Español:</p>
<p>messi</p>

<p>Idioma secreto:</p>
<p>POJJI</p>

<h2>Prueba</h2>
<input id="respuesta" placeholder="Escribe la traducción de calvo">
<button onclick="verificar()">Verificar</button>

<p id="resultado"></p>

<script>
function verificar() {
  let r = document.getElementById("respuesta").value;

  if (r === "YUQGE") {
    document.getElementById("resultado").innerHTML = "✅ Correcto";
  } else {
    document.getElementById("resultado").innerHTML = "❌ Incorrecto";
  }
}
</script>
</body>
</html>
